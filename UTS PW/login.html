<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

 <style>
    body{
      font-family: 'Poppins', sans-serif;
    }
</style>
</head>
<body class="bg-pink-100 flex items-center justify-center min-h-screen">
    <div class="flex flex-row sm:flex sm:items-center bg-white rounded-lg shadow-lg max-w-4xl">
         <div class="basis-1/2 relative overflow-hidden rounded-l-lg">
            <img src="lily.jpg" alt="Login Image" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-transparent to-white">
        </div>
    </div>

    <div class="basis-1/2 px-12 py-10 flex flex-col justify-center">
        <h2 class="text-3xl font-bold text-pink-400 -mt-4 mb-12 text-center">Login to Bloomify</h2>
        <form class="flex flex-col gap-4 w-full">
            <input type="text" placeholder="Username" class="px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pink-400">
            <input type="password" placeholder="Password" class="px-4 py-2 mb-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pink-400">
            <p class="text-xs text-gray-500">Forgot your password? <a href="#" class="text-pink-400 hover:text-pink-500">Reset it</a></p>
            <button type="submit" class="bg-pink-400 hover:bg-pink-500 text-white px-5 py-2 rounded-full">Login</button>
            <p class="text-sm text-gray-500 text-center mb-4">Don't have an account? <a href="#" class="text-pink-400 hover:text-pink-500">Sign Up</a></p>
            <p class="text-sm text-gray-500 text-center mb-4">------------ OR OTHER ------------</p>
                
            <div class="flex flex-nowrap justify-center gap-3">
                <button type="button"
                    onclick="loginGoogle()"
                    class="hover:scale-110 transition">
                    <img src="Google.svg.png" class="w-8 h-8 mx-3">
                </button>

                <button type="button"
                    onclick="loginFacebook()"
                    class="hover:scale-110 transition">
                    <img src="Facebook.svg.png" class="w-8 h-8 mx-3">
                </button>

                <button type="button"
                    onclick="loginX()"
                    class="hover:scale-110 transition">
                    <img src="Xlogo.avif" class="w-8 h-8 mx-3">
                </button>
            </div>
        </form>
    </div>

<script>
function loginGoogle(){
    window.location.href="https://accounts.google.com/";
}
function loginFacebook(){
    window.location.href="https://www.facebook.com/login/";
}
function loginX(){
    window.location.href="https://twitter.com/i/flow/login";
}
</script>

</body>
</html>

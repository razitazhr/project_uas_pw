<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Box</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    body{
        font-family: 'Poppins', sans-serif;
    }
    </style>
</head>
<body class="bg-pink-50">
    <div class="max-w-6xl mx-auto p-10">
    <a 
    href="UTS PW.html"
    class="inline-block mb-8 bg-white px-5 py-2 rounded-full shadow text-pink-500"
    >
    ← Back
    </a>
    <div class="bg-white rounded-[40px] shadow-xl overflow-hidden">
        <div class="grid md:grid-cols-2 gap-10 p-10">
        <div>
            <img 
            src="https://i.pinimg.com/736x/32/93/a9/3293a993e81043f2339252e45e36df1b.jpg"
            alt="Gift Box"
            class="w-full h-full object-cover rounded-3xl"
            >
        </div>
        <div class="flex flex-col justify-center">
            <p class="uppercase tracking-[4px] text-gray-400 mb-2">
                Bloomify Collection
            </p>
            <h1 class="text-5xl font-bold text-pink-400 mb-5">
                Luxury Gift Box
            </h1>
            <p class="text-gray-600 leading-relaxed mb-6">
                Gift box premium berisi bunga, coklat, dan hadiah spesial dengan packaging elegant cocok untuk anniversary dan birthday gift.
            </p>
            <div class="mb-6">
            <span class="text-3xl font-bold text-pink-500">
                Rp 350.000
            </span>
        </div>
        <div class="space-y-3 mb-8 text-gray-600">
            <p>🎁 Premium Packaging</p>
            <p>🍫 Chocolate Included</p>
            <p>🚚 Same Day Delivery</p>
            <p>💌 Free Greeting Card</p>
        </div>
        <div class="flex gap-4">
            <button 
            type="button"
            class="bg-pink-400 hover:bg-pink-500 text-white px-8 py-3 rounded-full shadow-lg"
            >
            Buy Now
            </button>
            <button 
            type="button"
            id="wishlist-btn"
            class="border border-pink-400 text-pink-400 px-8 py-3 rounded-full"
            >
            Wishlist
            </button>
        </div>
        </div>
    </div>
    </div>
</div>
<script>
const wishlistBtn = document.getElementById("wishlist-btn");
wishlistBtn.addEventListener("click", 
function(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const product = {
        name: "Luxury Gift Box",
        price: "Rp 350.000",
        image: "https://i.pinimg.com/736x/32/93/a9/3293a993e81043f2339252e45e36df1b.jpg",
        quantity: 1
    };
    cart.push(product);
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Product added to cart!");
});
</script>
</body>
</html>
